<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
			rel="stylesheet"
		/>
		<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
		<meta name="theme-color" content="#3525cd">
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml">
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.svg">
		<link rel="manifest" href="%sveltekit.assets%/manifest.json">
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="bg-background text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container"
	>
		<a href="#main-content" class="skip-link">Saltar al contenido</a>
		<div class="flex min-h-dvh flex-col bg-background text-on-surface">%sveltekit.body%</div>
	</body>
</html>
